<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نورين</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Noto Kufi Arabic",sans-serif;
    }

    body{
      background:#FFFAF2;
    }

    /* الشريط العلوي */
    .navbar{
      width:calc(100% - 80px);
      margin: 25px auto;
      padding:10px 30px;
      background:linear-gradient(to left,#3E2454,#D6B7E2);
      border-radius:90px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    /* الشعار */
    .logo img{
      width:100px;
      height:auto;
      display:block;
    }

    /* روابط التنقل */
    .nav-links{
      display:flex;
      align-items:center;
      gap:60px;
      list-style:none;
    }

    .nav-links a{
      text-decoration:none;
      color:#FFFAF2;
      font-weight:600;
      font-size:16px;
      white-space:nowrap;
    }

    /* الأزرار */
    .nav-buttons{
      display:flex;
      gap:12px;
    }

    .nav-buttons button{
      background:#FFFAF2;
      box-shadow:0 3px 1px rgba(117, 116, 116, 0.2);
      border:none;
      border-radius:999px;
      font-weight:600;
      padding:6px 16px;
      font-size:14px;
      cursor:pointer;
      white-space:nowrap;

      transition: transform 0.35s cubic-bezier(.25,.8,.25,1),
                  box-shadow 0.35s cubic-bezier(.25,.8,.25,1);
    }

    .create{
      color:#70A0AF;
    }

    .login{
      color:#3E2454;
    }

    .nav-buttons button:hover{
      transform:scale(1.06);
      box-shadow:0 3px 1px rgba(117, 116, 116, 0.28);
    }

    .nav-buttons button:active{
      transform:scale(1.12);
      box-shadow:0 3px 1px rgba(117, 116, 116, 0.3);
    }
  </style>
</head>

<body>

  <nav class="navbar">

    <div class="logo">
      <img src="شعار نورين.png" alt="شعار نورين">
    </div>

    <ul class="nav-links">
      <li><a href="#">عن نورين</a></li>
      <li><a href="#">خدماتنا</a></li>
      <li><a href="#">الأسئلة الشائعة</a></li>
      <li><a href="#">تواصل معنا</a></li>
    </ul>

    <div class="nav-buttons">
      <button class="create">إنشاء حساب</button>
      <button class="login">تسجيل الدخول</button>
    </div>

  </nav>

</body>
</html>
